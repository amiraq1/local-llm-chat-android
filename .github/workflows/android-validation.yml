name: Android Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Build, Test, Lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Gradle help
        run: ./gradlew --no-daemon help --console=plain

      - name: Gradle tasks
        run: ./gradlew --no-daemon tasks --console=plain

      - name: Run unit tests
        run: ./gradlew --no-daemon test --console=plain

      - name: Assemble debug
        run: ./gradlew --no-daemon assembleDebug --console=plain

      - name: Run lint
        run: ./gradlew --no-daemon lint --console=plain
